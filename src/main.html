<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Lunar PJ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <div id="main-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] overflow-hidden">
        
        <!-- Top Accent Bar -->
        <div class="w-full h-2 bg-gradient-to-r from-[#5B8DEF] via-[#73CB8F] to-[#FEB729]"></div>

        <div class="p-10 flex flex-col items-center text-center gap-8">
            <!-- Logo / Icon -->
            <div class="bg-[#F2C00F] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] p-6">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#1E1E1E" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                    <path d="M19 3v4" />
                    <path d="M17 5h4" />
                </svg>
            </div>

            <div class="space-y-1">
                <h1 class="text-4xl font-black text-[#1E1E1E] uppercase tracking-tighter" style="-webkit-text-stroke: 1px #1E1E1E;">LUNAR PJ</h1>
                <p class="text-[#1E1E1E]/60 text-sm font-bold uppercase tracking-widest">Attendance Management</p>
            </div>

            <div class="w-full flex flex-col gap-4">
                <a href="#login"
                    class="w-full py-4 bg-[#F2C00F] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-xl font-black uppercase tracking-wider transition-all hover:-translate-y-0.5 active:translate-x-1 active:translate-y-1 active:shadow-none text-center">
                    Log In
                </a>

                <!-- <a href="#parent-check"
                    class="w-full py-4 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-xl font-black uppercase tracking-wider transition-all hover:-translate-y-0.5 active:translate-x-1 active:translate-y-1 active:shadow-none text-center">
                    Parent Check
                </a> -->
            </div>

            <p class="text-[#1E1E1E]/30 font-bold text-[10px] uppercase tracking-widest mt-4">
                Lunar PJ — Beta 1.0
            </p>
        </div>

        <!-- Bottom Accent -->
        <div class="w-full h-1.5 bg-gradient-to-r from-[#FEB729] via-[#73CB8F] to-[#5B8DEF]"></div>
    </div>

</body>

</html>
