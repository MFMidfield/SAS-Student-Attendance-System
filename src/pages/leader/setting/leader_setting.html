<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Leader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <div id="main-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] overflow-hidden">

        <!-- Top Accent Bar -->
        <div class="w-full h-2 bg-gradient-to-r from-[#B29B58] via-[#B08968] to-[#D96C6C]"></div>

        <!-- Header Section -->
        <div class="relative px-5 pt-5 pb-4">
            <div class="flex items-center gap-4">
                <!-- Avatar (large for settings) -->
                <div
                    class="h-16 w-16 shrink-0 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] overflow-hidden rounded-sm">
                    <img id="student-image" src="" alt="Leader Profile" class="w-full h-full object-cover">
                </div>

                <!-- Name + Role -->
                <div class="flex-1 min-w-0">
                    <p class="text-[10px] font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Leader Portal</p>
                    <h1 id="student-name" class="text-xl font-bold text-[#1E1E1E] tracking-tight truncate"
                        style="-webkit-text-stroke: 0.3px #1E1E1E;">Loading...</h1>
                    <p id="student-role" class="text-[10px] font-bold text-[#1E1E1E]/50 uppercase tracking-wider">Leader
                    </p>
                </div>

                <!-- Page Icon -->
                <div class="shrink-0 bg-[#B29B58] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] p-2.5">
                    <svg class="w-5 h-5" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Banner Image (hidden but kept for JS compatibility) -->
        <img id="bander-image" src="" alt="" class="hidden">

        <!-- Divider -->
        <div class="mx-5 border-t-2 border-[#1E1E1E]/15"></div>

        <!-- Profile Info Section -->
        <div class="px-5 pt-4 pb-2">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Profile Info</span>
            </div>

            <div class="bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] overflow-hidden">
                <!-- Email -->
                <div class="flex items-center gap-3 px-4 py-3 border-b border-[#1E1E1E]/15">
                    <div
                        class="w-8 h-8 shrink-0 bg-[#5B8DEF]/20 border border-[#1E1E1E]/30 flex items-center justify-center">
                        <svg class="w-4 h-4" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-[9px] font-bold text-[#1E1E1E]/40 uppercase tracking-wider">Email</p>
                        <p id="info-email" class="text-sm font-bold text-[#1E1E1E] truncate">Loading...</p>
                    </div>
                </div>
                <!-- Student ID -->
                <div class="flex items-center gap-3 px-4 py-3 border-b border-[#1E1E1E]/15">
                    <div
                        class="w-8 h-8 shrink-0 bg-[#F2C00F]/20 border border-[#1E1E1E]/30 flex items-center justify-center">
                        <svg class="w-4 h-4" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2"/>
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-[9px] font-bold text-[#1E1E1E]/40 uppercase tracking-wider">Student ID</p>
                        <p id="info-student-id" class="text-sm font-bold text-[#1E1E1E] truncate">Loading...</p>
                    </div>
                </div>
                <!-- Class -->
                <div class="flex items-center gap-3 px-4 py-3">
                    <div
                        class="w-8 h-8 shrink-0 bg-[#D96C6C]/20 border border-[#1E1E1E]/30 flex items-center justify-center">
                        <svg class="w-4 h-4" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                        </svg>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-[9px] font-bold text-[#1E1E1E]/40 uppercase tracking-wider">Class</p>
                        <p id="info-class" class="text-sm font-bold text-[#1E1E1E] truncate">Loading...</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions Section -->
        <div class="px-5 pt-3 pb-5">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Actions</span>
            </div>

            <div class="space-y-3">
                <!-- Change Avatar Button -->
                <button id="btn-change-avatar"
                    class="w-full flex items-center gap-3 p-3.5 bg-[#B4F8C8] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold transition-all">
                    <div
                        class="w-10 h-10 shrink-0 bg-white/30 border-2 border-[#1E1E1E] flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>
                    <div class="text-left">
                        <span class="text-sm font-bold uppercase tracking-wider block">Change Avatar</span>
                        <span class="text-[10px] font-bold opacity-60">Upload and crop profile picture</span>
                    </div>
                </button>

                <!-- Logout Button -->
                <button id="btn-logout"
                    class="w-full flex items-center gap-3 p-3.5 bg-[#D96C6C] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold transition-all">
                    <div
                        class="w-10 h-10 shrink-0 bg-white/30 border-2 border-[#1E1E1E] flex items-center justify-center">
                        <svg class="w-5 h-5" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </div>
                    <div class="text-left">
                        <span class="text-sm font-bold uppercase tracking-wider block">Log Out</span>
                        <span class="text-[10px] font-bold opacity-60">Sign out of your account</span>
                    </div>
                </button>

            </div>
        </div>

        <!-- Bottom Accent -->
        <div class="w-full h-1.5 bg-gradient-to-r from-[#D96C6C] via-[#B08968] to-[#B29B58]"></div>
    </div>

    <!-- Back Button -->
    <div class="fade-in w-full max-w-[450px] mt-4">
        <button id="btn-back"
            class="flex items-center justify-center gap-2 w-full p-3.5 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all">
            <svg class="w-5 h-5" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            <span class="text-sm tracking-wider">Back to Dashboard</span>
        </button>
    </div>

    <!-- Footer -->
    <div class="fade-in w-full max-w-[450px] mt-3 text-center">
        <p class="text-[#1E1E1E]/30 text-[10px] font-bold">Lunar PJ — Beta 1.0</p>
    </div>

    <!-- Logout Confirmation Modal -->
    <div id="logout-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4">
        <!-- Backdrop with Blur -->
        <div id="logout-backdrop" class="absolute inset-0 bg-[#1E1E1E]/40 backdrop-blur-md backdrop-fade-in"></div>

        <!-- Modal Content -->
        <div
            class="relative w-full max-w-[400px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[6px_6px_0px_#1E1E1E] p-8 flex flex-col items-center text-center gap-5 fade-in">

            <!-- Icon -->
            <div class="bg-[#D96C6C] border-2 border-[#1E1E1E] p-4 shadow-[3px_3px_0px_#1E1E1E]">
                <svg class="w-10 h-10" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
            </div>

            <!-- Text -->
            <div class="space-y-1">
                <h2 class="text-2xl font-black uppercase tracking-tight text-[#1E1E1E]">Log Out?</h2>
                <p class="text-[#1E1E1E] text-sm font-bold opacity-60">Auto-closing in <span id="logout-timer"
                        class="text-[#D96C6C] font-black text-base">10</span>s</p>
            </div>

            <!-- Buttons -->
            <div class="flex flex-row w-full gap-3">
                <button id="btn-confirm-logout"
                    class="flex-1 py-3 bg-[#D96C6C] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all text-sm tracking-wider">
                    ✓ Log Out
                </button>
                <button id="btn-cancel-logout"
                    class="flex-1 py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all text-sm tracking-wider">
                    ✕ Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Avatar Crop Modal -->
    <div id="avatar-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4">
        <!-- Backdrop with Blur -->
        <div id="avatar-backdrop" class="absolute inset-0 bg-[#1E1E1E]/40 backdrop-blur-md backdrop-fade-in"></div>

        <!-- Modal Content -->
        <div
            class="relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[6px_6px_0px_#1E1E1E] p-6 flex flex-col gap-5 fade-in">

            <div class="flex items-center justify-between">
                <h2 class="text-xl font-black uppercase tracking-tight text-[#1E1E1E]">Change Profile Picture</h2>
            </div>

            <!-- Upload Area -->
            <div class="space-y-3">
                <input type="file" id="avatar-input" class="hidden" accept="image/*">
                <button id="btn-select-image"
                    class="w-full py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase text-sm tracking-wider flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                    </svg>
                    Select Image
                </button>
            </div>

            <!-- Crop Area -->
            <div id="crop-container"
                class="bg-gray-100 border-2 border-dashed border-[#1E1E1E]/30 min-h-[300px] max-h-[400px] overflow-hidden relative">
                <img id="avatar-crop-image" src="" style="display:block; max-width:100%; opacity:0;">
                <div id="avatar-placeholder"
                    class="absolute inset-0 flex flex-col items-center justify-center gap-2 opacity-40 text-[#1E1E1E]">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p class="text-xs font-bold uppercase tracking-widest">No image selected</p>
                </div>
            </div>

            <!-- Modal Actions -->
            <div class="flex flex-row w-full gap-3 mt-2">
                <button id="btn-save-avatar"
                    class="flex-1 py-3 bg-[#B4F8C8] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all text-sm tracking-wider">
                    ✓ Save
                </button>
                <button id="btn-cancel-avatar"
                    class="flex-1 py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all text-sm tracking-wider">
                    ✕ Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Save Confirmation Modal -->
    <div id="save-modal" class="fixed inset-0 z-[60] flex items-center justify-center hidden p-4">
        <!-- Backdrop -->
        <div id="save-backdrop" class="absolute inset-0 bg-[#1E1E1E]/40 backdrop-blur-md backdrop-fade-in"></div>

        <!-- Modal Content -->
        <div
            class="relative w-full max-w-[400px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[6px_6px_0px_#1E1E1E] p-8 flex flex-col items-center text-center gap-5 fade-in">
            <!-- Icon -->
            <div class="bg-[#B4F8C8] border-2 border-[#1E1E1E] p-4 shadow-[3px_3px_0px_#1E1E1E]">
                <svg class="w-10 h-10" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>

            <!-- Text -->
            <div class="space-y-1">
                <h2 class="text-2xl font-black uppercase tracking-tight text-[#1E1E1E]">Save Changes?</h2>
                <p class="text-[#1E1E1E] text-sm font-bold opacity-60">Do you want to update your profile picture?</p>
            </div>

            <!-- Buttons -->
            <div class="flex flex-row w-full gap-3">
                <button id="btn-confirm-save"
                    class="flex-1 py-3 bg-[#B4F8C8] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all text-sm tracking-wider">
                    ✓ Confirm
                </button>
                <button id="btn-cancel-save"
                    class="flex-1 py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all text-sm tracking-wider">
                    ✕ Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Cropper loaded via index.html -->
</body>


</html>
