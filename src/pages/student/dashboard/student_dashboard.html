<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Lunar PJ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <div id="main-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] overflow-hidden">

        <!-- Top Accent Bar -->
        <div class="w-full h-2 bg-gradient-to-r from-[#E46F20] via-[#FEB729] to-[#73CB8F]"></div>

        <!-- Profile Header -->
        <div class="relative px-5 pt-5 pb-4">
            <div class="flex items-center gap-4">
                <!-- Avatar -->
                <div
                    class="h-16 w-16 shrink-0 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] overflow-hidden rounded-sm">
                    <img id="student-image" src="" alt="Student Profile" class="w-full h-full object-cover">
                </div>

                <!-- Name + Greeting -->
                <div class="flex-1 min-w-0">
                    <p id="greeting-text" class="text-sm font-bold text-[#1E1E1E]/60 uppercase tracking-wider">Good
                        Morning</p>
                    <h1 id="student-name" class="text-xl font-bold text-[#1E1E1E] tracking-tight truncate"
                        style="-webkit-text-stroke: 0.3px #1E1E1E;">Loading...</h1>
                </div>

                <!-- Date Badge -->
                <div
                    class="shrink-0 bg-[#F2C00F] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] px-3 py-1.5 text-center">
                    <p id="current-day" class="text-[10px] font-bold text-[#1E1E1E] uppercase leading-tight">MON</p>
                    <p id="current-date" class="text-lg font-black text-[#1E1E1E] leading-tight">01</p>
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div class="mx-5 border-t-2 border-[#1E1E1E]/15"></div>

        <!-- Stats Overview -->
        <div class="px-5 pt-4 pb-2">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">This Month's
                    Attendance</span>
            </div>

            <div class="grid grid-cols-4 gap-2">
                <!-- Present -->
                <div
                    class="bg-[#219653]/15 border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] p-2 text-center cursor-default">

                            xml:space="preserve">

                            <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>

                                    </g>
                                </g>
                            </g>
                        </svg>
                    </div>

                <!-- Activity -->

                    <p class="text-[9px] font-bold text-[#1E1E1E]/50 uppercase">Sick</p>
                </div>
                <!-- Personal -->

                    class="bg-[#B08968]/15 border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] p-2 text-center cursor-default">

        <!-- Today's Schedule Section -->
        <div class="px-5 pt-2 pb-2">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Today's Classes</span>
            </div>

            <div id="schedule-container" class="space-y-2.5">
                <!-- Loading State -->
                <div class="bg-white border-2 border-[#1E1E1E] p-4 text-center shadow-[3px_3px_0px_#1E1E1E]">
                    <p class="text-sm font-bold text-[#1E1E1E]/40 uppercase animate-pulse">Checking Schedule...</p>
                </div>
            </div>
        </div>

        <!-- Navigation Grid -->
        <div class="px-5 pt-3 pb-5">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Quick Actions</span>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <!-- Attendance Card -->
                <button id="btn-attendance"
                    class="fade-in flex flex-col items-center gap-2 p-4 bg-[#E46F20] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] cursor-pointer group">
                    <div
                        class="w-12 h-12 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] flex items-center justify-center group-hover:rotate-6 transition-transform duration-200">
                        <svg class="w-6 h-6" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <span class="text-sm font-bold text-[#1E1E1E] uppercase tracking-wider">Attendance</span>
                    <span class="text-[10px] font-bold text-[#1E1E1E]/50">Check in now</span>
                </button>

                <!-- Schedule Card -->
                <button id="btn-schedule"
                    class="fade-in flex flex-col items-center gap-2 p-4 bg-[#FEB729] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] cursor-pointer group">
                    <div
                        class="w-12 h-12 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] flex items-center justify-center group-hover:rotate-6 transition-transform duration-200">
                        <svg class="w-6 h-6" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <span class="text-sm font-bold text-[#1E1E1E] uppercase tracking-wider">Schedule</span>
                    <span class="text-[10px] font-bold text-[#1E1E1E]/50">View classes</span>
                </button>

                <!-- Activity Card -->
                <button id="btn-activity"
                    class="fade-in flex flex-col items-center gap-2 p-4 bg-[#73CB8F] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] cursor-pointer group">
                    <div
                        class="w-12 h-12 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] flex items-center justify-center group-hover:rotate-6 transition-transform duration-200">
                        <svg class="w-6 h-6" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <span class="text-sm font-bold text-[#1E1E1E] uppercase tracking-wider">Activity</span>
                    <span class="text-[10px] font-bold text-[#1E1E1E]/50">Join events</span>
                </button>

                <!-- Setting Card -->
                <button id="btn-setting"
                    class="fade-in flex flex-col items-center gap-2 p-4 bg-[#B29B58] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] cursor-pointer group">
                    <div
                        class="w-12 h-12 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] flex items-center justify-center group-hover:rotate-6 transition-transform duration-200">
