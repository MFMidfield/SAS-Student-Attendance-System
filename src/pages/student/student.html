<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance - Neubrutalism</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Custom Font เพื่อให้เข้ากับสไตล์ */
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }

        /* Animation for fade in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        /* Animation สำหรับปุ่มที่ถูกเลือก (Toggle) */
        .btn-active {
            transform: translate(2px, 2px) !important;
            box-shadow: 2px 2px 0px #1E1E1E !important;
            color: #ffffff !important;
        }

        .btn-active-2 {
            transform: translate(2px, 2px) !important;
            box-shadow: 2px 2px 0px #1E1E1E !important;
            color: #1E1E1E !important;
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <div id="main-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-4 border-[#1E1E1E] shadow-[8px_8px_0px_#1E1E1E] overflow-hidden">

        <div class="relative w-full h-64 bg-[#1E1E1E] overflow-hidden border-b-4 border-[#1E1E1E]">
            <img id="student-image" src="" alt="Student Profile" class="w-full h-full object-cover">
        </div>

        <div class="relative -mt-8 px-6 mb-6">
            <div
                class="bg-[#FFFFFF] border-4 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] py-2 text-center relative z-10">
                <span class="text-[#1E1E1E] text-xl font-black uppercase tracking-wider"
                    style="-webkit-text-stroke: 0.5px #1E1E1E;">Kanisorn laopram</span>
            </div>
        </div>

        <div class="px-6 space-y-4">
            <button id="btn-present"
                class="status-btn w-full py-3 bg-[#219653] border-4 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-xl tracking-wider font-black transition-all">
                Present
            </button>

            <div class="flex gap-4">
                <button id="btn-sick"
                    class="status-btn flex-1 py-3 bg-[#E25C5C] border-4 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-xl tracking-wider font-black transition-all">
                    Sick
                </button>
                <button id="btn-personal"
                    class="status-btn flex-1 py-3 bg-[#007BFF] border-4 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-xl tracking-wider font-black transition-all">
                    Personal
                </button>
            </div>

            <div class="relative">
                <textarea id="reason-box" onfocus="this.classList.add('btn-active-2')"
                    onblur="this.classList.remove('btn-active-2')" placeholder="Tell us why?.."
                    class="w-full h-24 p-3 bg-[#EEEDDE] border-4 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold placeholder-[#1E1E1E]/50 transition-all focus:outline-none resize-none"></textarea>
            </div>

            <button id="btn-submit" class="w-full py-4 mb-6 bg-[#F2C00F] border-4 border-[#1E1E1E] shadow-[6px_6px_0px_#1E1E1E] text-[#1E1E1E] text-2xl font-black uppercase transition-all">
                Confirm
            </button>
        </div>
    </div>

    <div class="fade-in flex flex-row justify-end items-center w-full max-w-[450px] mt-6">
        <div class="w-full">
            <button id="btn-logout" class="btn-active flex flex-row justify-center items-center w-full p-4 h-15 bg-[#EEEDDE] border-4 border-[#1E1E1E] shadow-[6px_6px_0px_#1E1E1E] text-[#1E1E1E] text-2xl font-black uppercase transition-all">
                <span class="text-[#1E1E1E] text-xl font-black uppercase tracking-wider" style="-webkit-text-stroke: 1px #1E1E1E;">LOGOUT</span></button>
        </div>
    </div>


</body>

</html>
