<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule - Lunar PJ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <div id="main-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] overflow-hidden">

        <!-- Top Accent Bar -->
        <div class="w-full h-2 bg-gradient-to-r from-[#FEB729] via-[#E46F20] to-[#D96C6C]"></div>

        <!-- Header Section -->
        <div class="relative px-5 pt-5 pb-4">
            <div class="flex items-center gap-4">
                <!-- Avatar -->
                <div class="h-14 w-14 shrink-0 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] overflow-hidden rounded-sm">
                    <img id="student-image" src="" alt="Student Profile" class="w-full h-full object-cover">
                </div>

                <!-- Name -->
                <div class="flex-1 min-w-0">
                    <p class="text-[10px] font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Class Schedule</p>
                    <h1 id="student-name" class="text-xl font-bold text-[#1E1E1E] tracking-tight truncate"
                        style="-webkit-text-stroke: 0.3px #1E1E1E;">Loading...</h1>
                </div>

                <!-- Page Icon -->
                <div class="shrink-0 bg-[#FEB729] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] p-2.5">
                    <svg class="w-5 h-5" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div class="mx-5 border-t-2 border-[#1E1E1E]/15"></div>

        <!-- Banner Image (hidden but kept for JS compatibility) -->
        <img id="bander-image" src="" alt="" class="hidden">

        <!-- Schedule Header & Filter -->
        <div class="px-5 pt-4 pb-2">
            <div class="flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                    <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Daily Schedule</span>
                </div>
                <div class="flex gap-2">
                    <select id="day-filter"
                        class="px-3 py-1.5 bg-white border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-[10px] font-bold focus:outline-none cursor-pointer hover:bg-[#EEEDDE] transition-colors uppercase appearance-none">
                        <option value="all">All Days</option>
                        <option value="1">Monday</option>
                        <option value="2">Tuesday</option>
                        <option value="3">Wednesday</option>
                        <option value="4">Thursday</option>
                        <option value="5">Friday</option>
                    </select>
                    <select id="room-filter"
                        class="px-3 py-1.5 bg-white border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-[10px] font-bold focus:outline-none cursor-pointer hover:bg-[#EEEDDE] transition-colors uppercase hidden appearance-none">
                        <option value="all">All Rooms</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Schedule List Container -->
        <div class="px-5 pb-5">
            <div id="schedule-list" class="space-y-3 max-h-[450px] overflow-y-auto pr-1 pb-4">
                <!-- Data will be injected here -->
                <div class="text-center py-10 opacity-50 font-bold">
                    <div class="space-y-3">
                        <div class="w-full h-16 bg-[#1E1E1E]/10 border-2 border-[#1E1E1E]/20"></div>
                        <div class="w-full h-16 bg-[#1E1E1E]/10 border-2 border-[#1E1E1E]/20"></div>
                        <div class="w-full h-16 bg-[#1E1E1E]/10 border-2 border-[#1E1E1E]/20"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Accent -->
        <div class="w-full h-1.5 bg-gradient-to-r from-[#D96C6C] via-[#E46F20] to-[#FEB729]"></div>
    </div>

    <!-- Back Button -->
    <div class="fade-in w-full max-w-[450px] mt-4">
        <button id="btn-back"
            class="flex items-center justify-center gap-2 w-full p-3.5 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all">
            <svg class="w-5 h-5" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            <span class="text-sm tracking-wider">Back to Dashboard</span>
        </button>
    </div>

</body>

</html>
