<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance - Neubrutalism</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <div id="main-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] overflow-hidden">

        <div class="relative w-full h-64 bg-[#1E1E1E] overflow-hidden border-b-4 border-[#1E1E1E]">
            <img id="bander-image" src="" alt="Student Profile" class="w-full h-full object-cover">
        </div>

        <div class="relative -mt-23 px-6 mb-6">
            <div class="flex flex-row max-w-[450px] justify-between">
                <div
                    class="h-28 w-28 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-center overflow-hidden relative z-10">
                    <img id="student-image" src="" alt="Student Profile" class="w-full h-full object-cover">
                </div>
                <div
                    class="bg-[#FFFFFF] w-[260px] mt-auto border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] px-4 p-2 text-center relative z-10">
                    <span id="student-name" class="text-[#1E1E1E] text-xl font-black uppercase tracking-wider"
                        style="-webkit-text-stroke: 0.5px #1E1E1E;">Loading...</span>
                </div>
            </div>
        </div>

        <div class="px-6 space-y-4">


            <div class="flex gap-4">
                <button id="btn-present"
                    class="status-btn w-full py-3 bg-[#219653] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-xl tracking-wider font-black transition-all">
                    Present
                </button>
                <button id="btn-activity"
                    class="status-btn w-full py-3 bg-[#5B8DEF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-xl tracking-wider font-black transition-all">
                    Activity
                </button>
            </div>
            <div class="flex gap-4">
                <button id="btn-sick"
                    class="status-btn flex-1 py-3 bg-[#E25C5C] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-xl tracking-wider font-black transition-all">
                    Sick
                </button>
                <button id="btn-personal"
                    class="status-btn flex-1 py-3 bg-[#B08968] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-xl tracking-wider font-black transition-all">
                    Personal
                </button>
            </div>

            <div class="relative">
                <textarea id="reason-box" onfocus="this.classList.add('btn-active-2')"
                    onblur="this.classList.remove('btn-active-2')" placeholder="Tell us why?.."
                    class="w-full h-24 p-3 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold placeholder-[#1E1E1E]/50 transition-all focus:outline-none resize-none"></textarea>
            </div>

            <button id="btn-submit"
                class="w-full py-4 mb-6 bg-[#F2C00F] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-2xl font-black uppercase transition-all">
                Confirm
            </button>
        </div>
    </div>

    <div class="fade-in flex flex-row justify-end items-center w-full max-w-[450px] mt-6">
        <div class="w-full">
            <button id="btn-back"
                class="flex flex-row justify-center items-center w-full p-4 h-15 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-2xl font-black uppercase transition-all">
                <span class="text-[#1E1E1E] text-xl font-black uppercase tracking-wider"
                    style="-webkit-text-stroke: 1px #1E1E1E;">Back</span></button>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4">
        <!-- Backdrop with Blur -->
        <div id="backdrop" class="absolute inset-0 bg-[#1E1E1E]/40 backdrop-blur-md backdrop-fade-in"></div>

        <!-- Modal Content -->
        <div
            class="relative w-full max-w-[450px] bg-[#EEEDDE] border-4 border-[#1E1E1E] shadow-[8px_8px_0px_#1E1E1E] p-8 flex flex-col items-center text-center gap-6 fade-in">
            <div class="bg-[#73CB8F] border-2 border-[#1E1E1E] p-4 shadow-[4px_4px_0px_#1E1E1E]">
                <svg id="saveIcon" class="w-12 h-12" fill="#1E1E1E" viewBox="0 0 1920 1920"
                    xmlns="http://www.w3.org/2000/svg">
                    <g id="SVGRepo_bgCarrier" stroke-width="2"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier">
                        <path
                            d="M790.706 338.824v112.94H395.412c-31.06 0-56.47 25.3-56.47 56.471v744.509c17.73-6.325 36.592-10.391 56.47-10.391h1129.412c19.877 0 38.738 4.066 56.47 10.39V508.236c0-31.171-25.412-56.47-56.47-56.47h-395.295V338.824h395.295c93.402 0 169.411 76.009 169.411 169.411v1242.353c0 93.403-76.01 169.412-169.411 169.412H395.412C302.009 1920 226 1843.99 226 1750.588V508.235c0-93.402 76.01-169.411 169.412-169.411h395.294Zm734.118 1016.47H395.412c-31.06 0-56.47 25.299-56.47 56.47v338.824c0 31.172 25.41 56.47 56.47 56.47h1129.412c31.058 0 56.47-25.298 56.47-56.47v-338.823c0-31.172-25.412-56.47-56.47-56.47ZM1016.622-.023v880.151l246.212-246.325 79.85 79.85-382.532 382.644-382.645-382.644 79.85-79.85L903.68 880.128V-.022h112.941ZM564.824 1468.235c-62.344 0-112.942 50.71-112.942 112.941s50.598 112.942 112.942 112.942c62.343 0 112.94-50.71 112.94-112.942 0-62.23-50.597-112.94-112.94-112.94Z"
                            fill-rule="evenodd"></path>
                    </g>
                </svg>
            </div>

            <div class="space-y-2">
                <h2 class="text-2xl font-black uppercase tracking-tight text-[#1E1E1E]">Submit?</h2>
                <p class="text-[#1E1E1E] font-bold opacity-70">Closing in <span id="timer"
                        class="text-[#D96C6C]">10</span> seconds</p>
            </div>

            <div class="flex flex-row w-full gap-4">
                <button id="btn-confirm"
                    class="flex-1 py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-black uppercase transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none">
                    Confirm
                </button>
                <button id="btn-cancel"
                    class="flex-1 py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-black uppercase transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none">
                    Cancel
                </button>
            </div>
        </div>
    </div>


</body>

</html>
