<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check In - Lunar PJ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }

        .countdown-ring {
            transform: rotate(-90deg);
        }

        .countdown-ring circle {
            transition: stroke-dashoffset 1s linear;
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <div id="main-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] overflow-hidden">

        <!-- Top Accent Bar -->
        <div class="w-full h-2 bg-gradient-to-r from-[#219653] via-[#5B8DEF] to-[#E25C5C]"></div>

        <!-- Header Section -->
        <div class="relative px-5 pt-5 pb-4">
            <div class="flex items-center gap-4">
                <!-- Avatar -->
                <div
                    class="h-14 w-14 shrink-0 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] overflow-hidden rounded-sm">
                    <img id="student-image" src="" alt="Student Profile" class="w-full h-full object-cover">
                </div>

                <!-- Name -->
                <div class="flex-1 min-w-0">
                    <p class="text-[10px] font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Check In As</p>
                    <h1 id="student-name" class="text-xl font-bold text-[#1E1E1E] tracking-tight truncate"
                        style="-webkit-text-stroke: 0.3px #1E1E1E;">Loading...</h1>
                </div>

                <!-- Page Icon -->
                <div class="shrink-0 bg-[#219653] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] p-2.5">
                    <svg class="w-5 h-5" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div class="mx-5 border-t-2 border-[#1E1E1E]/15"></div>

        <!-- Banner Image (hidden but kept for JS compatibility) -->
        <img id="bander-image" src="" alt="" class="hidden">

        <!-- Status Selection -->
        <div class="px-5 pt-4">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Select Status</span>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button id="btn-present"
                    class="flex items-center gap-2.5 p-3 bg-[#219653] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold transition-all">

                        class="w-9 h-9 shrink-0 bg-white/30 border-2 border-[#1E1E1E] flex items-center justify-center">

                                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                                <g id="SVGRepo_iconCarrier">

                                        <g>
                                            <polygon
                                                points="311.757,41.803 107.573,245.96 23.986,162.364 0,186.393 107.573,293.962 335.765,65.795 ">
                                            </polygon>
                                        </g>
                                    </g>
                                </g>
                            </svg></span>
                    </div>
                    <div class="text-left">
                        <span class="text-sm font-bold uppercase tracking-wider block">Present</span>
                        <span class="text-[9px] font-bold opacity-60">On time</span>
                    </div>
                </button>

                <button id="btn-sick"
                    class="flex items-center gap-2.5 p-3 bg-[#E25C5C] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold transition-all">
                    <div
                        class="w-9 h-9 shrink-0 bg-white/30 border-2 border-[#1E1E1E] flex items-center justify-center">
                        <span class="text-base">
                            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                                <g id="SVGRepo_iconCarrier">
                                    <path
                                        d="M18 3V21M18 3L15 6M18 3L21 6M7 15.9998C6.44772 15.9998 6 16.4475 6 16.9998C6 17.5521 6.44772 17.9998 7 17.9998C7.55228 17.9998 8 17.5521 8 16.9998C8 16.4475 7.55228 15.9998 7 15.9998ZM7 15.9998V11.9998M7 16.9998L7.00707 17.0069M11 16.9998C11 19.209 9.20914 20.9998 7 20.9998C4.79086 20.9998 3 19.209 3 16.9998C3 15.9854 3.37764 15.0591 4 14.354L4 6C4 4.34315 5.34315 3 7 3C8.65685 3 10 4.34315 10 6V14.354C10.6224 15.0591 11 15.9854 11 16.9998Z"

                                        stroke-linejoin="round"></path>
                                </g>
                            </svg>
                        </span>
                    </div>
                    <div class="text-left">
                        <span class="text-sm font-bold uppercase tracking-wider block">Sick</span>
                        <span class="text-[9px] font-bold opacity-60">Health issue</span>
                    </div>
                </button>

                <button id="btn-personal"
                    class="flex items-center gap-2.5 p-3 bg-[#B08968] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold transition-all">
                    <div
                        class="w-9 h-9 shrink-0 bg-white/30 border-2 border-[#1E1E1E] flex items-center justify-center">
                        <span class="text-base">

                    <div class="text-left">

                        <span class="text-[9px] font-bold opacity-60">Other reason</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Subject & Reason -->
        <div class="px-5 pt-4 pb-5 space-y-3">
            <div class="flex items-center gap-2 mb-1">
                <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Details</span>
            </div>

            <!-- Subject Display (Non-interactive) -->
            <div id="subject-container" class="relative mb-5">
                <div id="subject-display"
                    class="w-full p-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold text-sm">
                    No class scheduled
                </div>
            </div>

            <!-- Leave Scope (Hidden by default) -->
            <div id="leave-scope-container" class="relative mb-5 hidden space-y-2">

                <div class="grid grid-cols-3 gap-2">
                    <button type="button" id="scope-full" 
                        class="scope-btn py-2 border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] font-black text-[10px] uppercase transition-all bg-white hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-[2px_2px_0px_#1E1E1E]">
                        All Day
                    </button>
                    <button type="button" id="scope-morning" 
                        class="scope-btn py-2 border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] font-black text-[10px] uppercase transition-all bg-white hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-[2px_2px_0px_#1E1E1E]">
                        Morning
                    </button>
                    <button type="button" id="scope-afternoon" 
                        class="scope-btn py-2 border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] font-black text-[10px] uppercase transition-all bg-white hover:translate-x-[1px] hover:translate-y-[1px] hover:shadow-[2px_2px_0px_#1E1E1E]">
                        Afternoon
                    </button>
                </div>
            </div>

            <!-- Date Select (Hidden by default) -->
            <div id="date-container" class="relative mb-5 hidden">
                <input type="date" id="attendance-date" 
                    onkeydown="return false"
                    onclick="this.showPicker()"
                    class="w-full p-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold transition-all outline-none text-sm cursor-pointer">
            </div>

            <div class="flex items-center gap-2 mb-1">
                <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Reason</span>
            </div>

            <!-- Reason Box -->
            <textarea id="reason-box" placeholder="Tell us why? (optional)"
                class="w-full h-22 p-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-sm font-bold placeholder-[#1E1E1E]/40 transition-all focus:outline-none resize-none"></textarea>

            <!-- Submit Button -->
            <button id="btn-submit"
                class="w-full py-4 bg-[#F2C00F] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-xl font-black uppercase tracking-wider transition-all flex items-center justify-center gap-3">
                <svg class="w-6 h-6" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
                Confirm
            </button>
        </div>

        <!-- Bottom Accent -->
        <div class="w-full h-1.5 bg-gradient-to-r from-[#E25C5C] via-[#5B8DEF] to-[#219653]"></div>
    </div>

    <!-- Back Button -->
    <div class="fade-in w-full max-w-[450px] mt-4">
        <button id="btn-back"
            class="flex items-center justify-center gap-2 w-full p-3.5 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all">
            <svg class="w-5 h-5" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            <span class="text-sm tracking-wider">Back to Dashboard</span>
        </button>
    </div>

    <!-- Confirmation Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4">
        <!-- Backdrop with Blur -->
        <div id="backdrop" class="absolute inset-0 bg-[#1E1E1E]/40 backdrop-blur-md backdrop-fade-in"></div>

        <!-- Modal Content -->
        <div
            class="relative w-full max-w-[400px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[6px_6px_0px_#1E1E1E] p-8 flex flex-col items-center text-center gap-5 fade-in">

            <!-- Icon -->
            <div class="bg-[#F2C00F] border-2 border-[#1E1E1E] p-4 shadow-[3px_3px_0px_#1E1E1E]">
                <svg id="saveIcon" class="w-10 h-10" fill="none" stroke="#1E1E1E" stroke-width="2.5"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>

            <!-- Text & Countdown -->
            <div class="flex flex-col items-center gap-2 w-full">
                <h2 class="text-xl font-black uppercase tracking-tight text-[#1E1E1E]">Confirm Submit?</h2>
                <p class="text-[10px] font-bold text-[#E25C5C] uppercase tracking-widest -mt-1">You can only submit once
                </p>
                <div class="flex items-center gap-3">
                    <div class="relative w-10 h-10">
                        <svg class="countdown-ring w-10 h-10" viewBox="0 0 36 36">
                            <circle cx="18" cy="18" r="15.5" fill="none" stroke="#1E1E1E" stroke-width="2"
                                opacity="0.15" />
                            <circle id="countdown-circle" cx="18" cy="18" r="15.5" fill="none" stroke="#1E1E1E"
                                stroke-width="2.5" stroke-dasharray="97.39" stroke-dashoffset="0"
                                stroke-linecap="square" />
                        </svg>
                        <span id="countdown-number"
                            class="absolute inset-0 flex items-center justify-center text-sm font-black">5</span>
                    </div>
                    <span id="countdown-label" class="text-xs font-bold opacity-50 uppercase">Please wait...</span>
                </div>
            </div>

            <!-- Summary Information -->
            <div
                class="w-full bg-white/50 border-2 border-[#1E1E1E] p-3 text-left space-y-1.5 shadow-[3px_3px_0px_#1E1E1E]">
                <div class="flex justify-between text-xs font-black uppercase">
                    <span class="opacity-50">Status:</span>
                    <span id="summary-status" class="text-[#219653]">Present</span>
                </div>
                <div class="flex justify-between text-xs font-black uppercase">
                    <span class="opacity-50">Details:</span>
                    <span id="summary-subject" class="truncate max-w-[150px]">Homeroom</span>
                </div>
                <div class="flex flex-col text-xs font-black uppercase pt-1 border-t border-[#1E1E1E]/10">
                    <span class="opacity-50 mb-0.5">Reason:</span>
                    <span id="summary-reason" class="normal-case font-bold text-[10px] line-clamp-2">-</span>
                </div>
            </div>

            <!-- Buttons -->
            <div class="flex flex-row w-full gap-3">
                <button id="btn-confirm" disabled
                    class="flex-1 py-3 border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] font-black text-sm uppercase tracking-wider transition-all bg-gray-300 text-gray-500 cursor-not-allowed">
                    Confirm
                </button>
                <button id="btn-cancel"
                    class="flex-1 py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all text-sm tracking-wider">
                    ✕ Cancel
                </button>
            </div>
        </div>
    </div>

</body>

</html>
