<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Logs - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }

        /* Responsive for 375x667 (iPhone 6/7/8) */
        @media (max-height: 670px) {
            #main-card {
                max-height: 95vh;
                display: flex;
                flex-direction: column;
            }
            #schedule-list {
                max-height: 320px !important; 
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(12px);
            }
        }

        @keyframes backdropIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes backdropOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .fade-in {
            animation: fadeIn 0.35s ease forwards;
        }

        .fade-out {
            animation: fadeOut 0.35s ease forwards;
        }

        .backdrop-fade-in {
            animation: backdropIn 0.35s ease forwards;
        }

        .backdrop-fade-out {
            animation: backdropOut 0.35s ease forwards;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1E1E1E;
            border-radius: 2px;
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <!-- Main Card -->
    <div id="main-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] overflow-hidden">

        <div class="relative mb-6 w-full border-b-2">
            <div class="flex flex-row w-full">

                <div class="flex-1 border-[#1E1E1E] px-4 p-2 flex justify-center items-center relative z-10">
                    <span id="" class="text-[#1E1E1E] text-xl font-bold uppercase tracking-wider"
                        style="-webkit-text-stroke: 0.5px #1E1E1E;">Attendance Logs</span>
                </div>


            </div>
        </div>


        <!-- Content -->
        <div class="px-6 space-y-4 mb-6">
            <!-- Header Row -->
            <div class="flex justify-between items-center">
                <div class="flex gap-2 justify-start mb-1">
                    <!-- Date Filter -->
                    <input type="date" id="date-filter" 
                        onkeydown="return false"
                        onclick="this.showPicker()"
                        class="px-3 py-2 bg-[#F2C00F] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[13px] font-bold focus:outline-none cursor-pointer hover:bg-[#EEEDDE] transition-colors">
                    
                    <!-- Room Filter (admin/teacher only — shown via JS) -->
                    <select id="room-filter"
                        class="px-3 py-2 bg-white border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[14px] font-bold focus:outline-none cursor-pointer hover:bg-[#EEEDDE] transition-colors uppercase hidden">
                        <option value="all">All Rooms</option>
                    </select>
                </div>
            </div>

            <!-- Search Filter -->
                <div class="w-full relative mt-4">
                    <input type="text" id="search-filter" placeholder="Search by Name, ID..." class="w-full px-4 py-2 bg-white border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[13px] font-bold focus:outline-none placeholder-gray-500 transition-all">
                    <svg class="w-5 h-5 absolute right-3 top-2.5 text-[#1E1E1E]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>

            <!-- Log List -->
            <div id="schedule-list" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                <div class="text-center py-10 opacity-50 font-bold">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Back Button -->
    <div class="fade-in flex flex-row justify-end items-center w-full max-w-[450px] mt-6">
        <div class="w-full">
            <button id="btn-back"
                class="flex flex-row justify-center items-center w-full p-4 h-15 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-2xl font-bold uppercase transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none">
                <span class="text-[#1E1E1E] text-xl font-bold uppercase tracking-wider"
                    style="-webkit-text-stroke: 1px #1E1E1E;">Back</span>
            </button>
        </div>
    </div>

    <!-- ============================== -->
    <!--  Note View Modal               -->
    <!-- ============================== -->
    <div id="modal-note" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <!-- Backdrop -->
        <div id="backdrop-note"
            class="absolute inset-0 bg-[#1E1E1E]/40 backdrop-blur-md backdrop-fade-in cursor-pointer"></div>

        <!-- Modal Content -->
        <div
            class="modal-content relative w-full max-w-[400px] bg-[#EEEDDE] border-4 border-[#1E1E1E] shadow-[8px_8px_0px_#1E1E1E] p-6 flex flex-col gap-5 fade-in">

            <!-- Header -->
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="bg-[#F2C00F] border-2 border-[#1E1E1E] p-2 shadow-[3px_3px_0px_#1E1E1E]">
                        <!-- Document Icon -->
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                        </svg>
                    </div>
                    <h2 class="text-lg font-black uppercase tracking-wider">บันทึกการเข้าเรียน</h2>
                </div>
                <button id="btn-note-close"
                    class="w-9 h-9 flex items-center justify-center border-2 border-[#1E1E1E] bg-white shadow-[3px_3px_0px_#1E1E1E] font-bold hover:bg-[#E25C5C] hover:text-white transition-colors active:translate-x-[1px] active:translate-y-[1px] active:shadow-none">
                    ✕
                </button>
            </div>

            <!-- Student Info Grid -->
            <div class="grid grid-cols-2 gap-3">
                <div class="border-2 border-[#1E1E1E] bg-white p-3 shadow-[3px_3px_0px_#1E1E1E]">
                    <p class="text-[9px] font-bold uppercase opacity-50 mb-1">ชื่อ-นามสกุล</p>
                    <p id="note-student-name" class="text-sm font-black leading-tight">-</p>
                </div>
                <div class="border-2 border-[#1E1E1E] bg-white p-3 shadow-[3px_3px_0px_#1E1E1E]">
                    <p class="text-[9px] font-bold uppercase opacity-50 mb-1">รหัสนักเรียน</p>
                    <p id="note-student-id" class="text-sm font-black">-</p>
                </div>
                <div class="border-2 border-[#1E1E1E] bg-white p-3 shadow-[3px_3px_0px_#1E1E1E]">
                    <p class="text-[9px] font-bold uppercase opacity-50 mb-1">ห้องเรียน</p>
                    <p id="note-class" class="text-sm font-black">-</p>
                </div>
                <div
                    class="border-2 border-[#1E1E1E] bg-white p-3 shadow-[3px_3px_0px_#1E1E1E] flex flex-col justify-between">
                    <p class="text-[9px] font-bold uppercase opacity-50 mb-1">สถานะ</p>
                    <span id="note-status"
                        class="inline-block px-3 py-1 border-2 border-[#1E1E1E] text-xs font-bold uppercase shadow-[2px_2px_0px_#1E1E1E] bg-gray-200">-</span>
                </div>
            </div>

            <!-- Date & Subject -->
            <div class="grid grid-cols-2 gap-3">
                <div class="border-2 border-[#1E1E1E] bg-[#EEEDDE] p-3 shadow-[3px_3px_0px_#1E1E1E]">
                    <p class="text-[9px] font-bold uppercase opacity-50 mb-1">วันที่-เวลา</p>
                    <p id="note-date" class="text-sm font-black">-</p>
                </div>
                <div class="border-2 border-[#1E1E1E] bg-[#EEEDDE] p-3 shadow-[3px_3px_0px_#1E1E1E]">
                    <p class="text-[9px] font-bold uppercase opacity-50 mb-1">วิชา</p>
                    <p id="note-subject" class="text-sm font-black leading-tight">-</p>
                </div>
            </div>

            <!-- Note Content -->
            <div class="border-2 border-[#1E1E1E] bg-white p-4 shadow-[3px_3px_0px_#1E1E1E] min-h-[80px]">
                <p class="text-[9px] font-bold uppercase opacity-50 mb-2">หมายเหตุ</p>
                <p id="note-content" class="text-sm font-bold leading-relaxed opacity-80 italic whitespace-pre-wrap">-
                </p>
            </div>
        </div>
    </div>

</body>

</html>
