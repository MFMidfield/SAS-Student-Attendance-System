<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance - Neubrutalism</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <div id="main-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] overflow-hidden">

        <div class="relative w-full h-64 bg-[#1E1E1E] overflow-hidden border-b-4 border-[#1E1E1E]">
            <img id="bander-image" src="" alt="Student Profile" class="w-full h-full object-cover">
        </div>

        <div class="relative -mt-19 px-6 mb-6">
            <div class="flex flex-row max-w-[450px] justify-between gap-4">
                <div
                    class="h-23 w-23 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-center overflow-hidden relative z-10 shrink-0">
                    <img id="student-image" src="" alt="Student Profile" class="w-full h-full object-cover">
                </div>
                <div
                    class="bg-[#FFFFFF] w-full mt-auto border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] p-2 text-center relative z-10 ">
                    <span id="student-name" class="text-[#1E1E1E] text-[17px] font-bold uppercase tracking-wider"
                        style="-webkit-text-stroke: 0.5px #1E1E1E;">Loading...</span>
                </div>
            </div>
        </div>

        <div class="space-y-4">
            <div class="px-6 space-y-4">
                <button id="btn-logout"
                    class="flex-1 py-3 mb-6 w-full bg-[#D96C6C] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-xl tracking-wider font-bold transition-all">
                    Log Out
                </button>
            </div>
        </div>
    </div>

    <div class="fade-in flex flex-row justify-end items-center w-full max-w-[450px] mt-6">
        <div class="w-full">
            <button id="btn-back"
                class="flex flex-row justify-center items-center w-full p-4 h-15 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-2xl font-bold uppercase transition-all">
                <span class="text-[#1E1E1E] text-xl font-bold uppercase tracking-wider"
                    style="-webkit-text-stroke: 1px #1E1E1E;">Back</span></button>
        </div>
    </div>

    <!-- Logout Confirmation Modal -->
    <div id="logout-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden p-4">
        <!-- Backdrop with Blur -->
        <div id="logout-backdrop" class="absolute inset-0 bg-[#1E1E1E]/40 backdrop-blur-md backdrop-fade-in"></div>
        
        <!-- Modal Content -->
        <div class="relative w-full max-w-[450px] bg-[#EEEDDE] border-4 border-[#1E1E1E] shadow-[8px_8px_0px_#1E1E1E] p-8 flex flex-col items-center text-center gap-6 fade-in">
            <div class="bg-[#D96C6C] border-2 border-[#1E1E1E] p-4 shadow-[4px_4px_0px_#1E1E1E]">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#1E1E1E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </div>

            <div class="space-y-2">
                <h2 class="text-2xl font-bold uppercase tracking-tight text-[#1E1E1E]">log out?</h2>
                <p class="text-[#1E1E1E] font-bold opacity-70">Closing in <span id="logout-timer" class="text-[#D96C6C]">10</span> seconds</p>
            </div>

            <div class="flex flex-row w-full gap-4">
                <button id="btn-confirm-logout" 
                    class="flex-1 py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none">
                    Confirm
                </button>
                <button id="btn-cancel-logout" 
                    class="flex-1 py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none">
                    Cancel
                </button>
            </div>
        </div>
    </div>

</body>

</html>
