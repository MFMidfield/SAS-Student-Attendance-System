<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - Lunar PJ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }

        /* Responsive for 375x667 (iPhone 6/7/8) */
        @media (max-height: 670px) {
            #main-card {
                max-height: 95vh;
                display: flex;
                flex-direction: column;
            }

            #schedule-list {
                max-height: 320px !important;
                /* Adjust list height to fit 667px screen */
            }
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <div id="main-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] overflow-hidden">

        <!-- Top Accent Bar -->
        <div class="w-full h-2 bg-gradient-to-r from-[#E46F20] via-[#F18B74] to-[#FEB729]"></div>
        <!-- Header -->
        <div class="relative px-5 pt-5 pb-4">
            <div class="flex items-center gap-4">
                <div class="shrink-0 bg-[#E46F20] border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] p-2.5">
                    <svg class="w-5 h-5" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                </div>
                <div class="flex-1 min-w-0">
                    <p id="portal-title" class="text-[10px] font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Manage Accounts</p>
                    <h1 class="text-xl font-bold text-[#1E1E1E] tracking-tight"
                        style="-webkit-text-stroke: 0.3px #1E1E1E;">User Management</h1>
                </div>
                <div class="shrink-0">
                    <a href="#admin-register" id="btn-add-user" class="inline-block px-3 py-2 bg-[#73CB8F] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-xs font-bold text-[#1E1E1E] uppercase hover:bg-[#5bb778] active:translate-x-[1px] active:translate-y-[1px] active:shadow-none cursor-pointer hidden">
                        Add User
                    </a>
                </div>
            </div>
        </div>
        <div class="mx-5 border-t-2 border-[#1E1E1E]/15"></div>

        <!-- Filters -->
        <div class="px-5 pt-4 pb-2">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Filters</span>
            </div>
            <div class="flex gap-2 mb-3" id="filters-container">
                <!-- Role Filter (Only for Admin) -->
                <select id="role-filter"
                    class="hidden px-3 py-2 bg-white border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] text-[11px] font-bold focus:outline-none cursor-pointer uppercase hover:bg-[#EEEDDE] transition-colors appearance-none">
                    <option value="all">ALL ROLES</option>
                    <option value="admin">ADMIN</option>
                    <option value="teacher">TEACHER</option>
                    <option value="leader">LEADER</option>
                    <option value="student">STUDENT</option>
                </select>
                <!-- Class Filter (Only for Admin) -->
                <select id="class-filter"
                    class="hidden px-3 py-2 bg-[#F2C00F] border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] text-[11px] font-bold focus:outline-none cursor-pointer uppercase hover:bg-[#EEEDDE] transition-colors appearance-none">
                    <option value="all">ALL ROOMS</option>
                    <option value="4/9">M.4/9</option>
                    <option value="5/9">M.5/9</option>
                    <option value="6/9">M.6/9</option>
                    <option value="N/A">N/A (Admin)</option>
                </select>
            </div>
            <div class="w-full relative">
                <input type="text" id="search-filter" placeholder="Search by Name, ID..."
                    class="w-full px-4 py-2.5 bg-white border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] text-[11px] font-bold focus:outline-none placeholder-[#1E1E1E]/30 transition-all">
                <svg class="w-4 h-4 absolute right-3 top-3 text-[#1E1E1E]/40" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>
        </div>

        <!-- User List Container -->
        <div class="px-5 pb-4">
            <div id="schedule-list" class="space-y-3 max-h-[400px] overflow-y-auto pr-1 pb-4">
                <div class="bg-white border-2 border-[#1E1E1E] p-4 text-center shadow-[3px_3px_0px_#1E1E1E]">
                    <p class="text-sm font-bold text-[#1E1E1E]/40 uppercase">Loading users...</p>
                </div>
            </div>
        </div>
        <div class="w-full h-1.5 bg-gradient-to-r from-[#FEB729] via-[#F18B74] to-[#E46F20]"></div>
    </div>

    <!-- Back Button -->
    <div class="fade-in w-full max-w-[450px] mt-4">
        <button id="btn-back"
            class="flex items-center justify-center gap-2 w-full p-3.5 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none hover:bg-[#E0DFD1]">
            <svg class="w-5 h-5" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            <span class="text-sm tracking-wider">Back</span>
        </button>
    </div>

    <!-- Edit User Modal -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <!-- Backdrop with Blur -->
        <div id="backdrop" class="absolute inset-0 bg-[#1E1E1E]/40 backdrop-blur-md backdrop-fade-in"></div>

        <!-- Modal Content -->
        <div
            class="relative w-full max-w-[450px] max-h-[90vh] overflow-y-auto bg-[#EEEDDE] border-4 border-[#1E1E1E] shadow-[8px_8px_0px_#1E1E1E] p-8 flex flex-col items-center text-center gap-6 fade-in">
            <div class="flex flex-row justify-center items-center">
                <h2 id="modal-title" class="text-2xl font-bold uppercase tracking-wider">
                    Edit User
                </h2>
            </div>

            <!-- Profile Picture Section -->
            <div class="relative group mt-2">
                <div class="w-24 h-24 border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] overflow-hidden bg-white">
                    <img id="user-edit-avatar-preview" src="" class="w-full h-full object-cover">
                </div>
                <button id="btn-edit-avatar"
                    class="absolute -bottom-1 -right-1 p-2 bg-[#F2C00F] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] hover:bg-white transition-all active:translate-x-[1px] active:translate-y-[1px] active:shadow-none">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    </svg>
                </button>
                <input type="file" id="user-edit-avatar-input" class="hidden" accept="image/*">
            </div>

            <input type="hidden" id="edit-id">

            <!-- User Email (Read Only) -->
            <div class="relative w-full text-left">
                <label class="text-[10px] font-bold uppercase ml-1">Email Address</label>
                <div id="user-email-display"
                    class="w-full p-3 bg-gray-100 border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-[#1E1E1E] font-bold opacity-70">
                    -
                </div>
            </div>

            <!-- Firstname & Lastname -->
            <div class="grid grid-cols-2 gap-4 w-full">
                <div class="relative w-full text-left">
                    <label class="text-[10px] font-bold uppercase ml-1">Firstname</label>
                    <input type="text" id="firstname" placeholder="First name" maxlength="100"
                        class="w-full p-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-[#1E1E1E] font-bold focus:outline-none">
                </div>
                <div class="relative w-full text-left">
                    <label class="text-[10px] font-bold uppercase ml-1">Lastname</label>
                    <input type="text" id="lastname" placeholder="Last name" maxlength="100"
                        class="w-full p-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-[#1E1E1E] font-bold focus:outline-none">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 w-full">
                <!-- Student ID -->
                <div class="relative w-full text-left">
                    <label class="text-[10px] font-bold uppercase ml-1">Student ID</label>
                    <input type="text" id="stu_id" placeholder="e.g. 12345" maxlength="20"
                        class="w-full p-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-[#1E1E1E] font-bold focus:outline-none">
                </div>
                <!-- Roll Number -->
                <div class="relative w-full text-left">
                    <label class="text-[10px] font-bold uppercase ml-1">Roll Number</label>
                    <input type="number" id="roll_no" placeholder="Number" min="0"
                        class="w-full p-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-[#1E1E1E] font-bold focus:outline-none">
                </div>
            </div>

            <!-- Class ID -->
            <div class="relative w-full text-left">
                <label class="text-[10px] font-bold uppercase ml-1">Classroom</label>
                <select id="class_id"
                    class="w-full p-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-[#1E1E1E] font-bold focus:outline-none">
                    <option value="">-- Select Room --</option>
                    <option value="4/9">M.4/9</option>
                    <option value="5/9">M.5/9</option>
                    <option value="6/9">M.6/9</option>
                    <option value="N/A">N/A</option>
                </select>
            </div>

            <!-- Role -->
            <div class="relative w-full text-left">
                <label class="text-[10px] font-bold uppercase ml-1">Role</label>
                <select id="role"
                    class="w-full p-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-[#1E1E1E] font-bold focus:outline-none">
                    <option value="student">Student</option>
                    <option value="leader">Leader</option>
                    <option value="teacher">Teacher</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <div class="flex flex-row w-full gap-4 mt-4">
                <button id="btn-confirm"
                    class="flex-1 py-3 bg-[#73CB8F] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none">
                    Save
                </button>
                <button id="btn-delete"
                    class="flex-1 py-3 bg-[#E25C5C] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none hidden">
                    Delete
                </button>
                <button id="btn-close"
                    class="flex-1 py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none">
                    Close
                </button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal (Nested) -->
    <div id="modal-delete-confirm" class="fixed inset-0 z-[60] flex items-center justify-center p-4 hidden">
        <div id="backdrop-delete" class="absolute inset-0 bg-[#1E1E1E]/60 backdrop-blur-sm"></div>
        <div
            class="relative w-full max-w-[320px] bg-[#EEEDDE] border-4 border-[#1E1E1E] shadow-[8px_8px_0px_#1E1E1E] p-6 flex flex-col items-center text-center gap-4 fade-in">
            <div class="bg-[#E25C5C] border-2 border-[#1E1E1E] p-3 shadow-[4px_4px_0px_#1E1E1E]">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </div>
            <h2 class="text-xl font-bold uppercase tracking-wider">Are you sure?</h2>
            <p class="text-sm font-bold opacity-70">This action cannot be undone.<br>Auto-close in <span
                    id="delete-timer" class="text-[#E25C5C]">5</span>s</p>
            <div class="flex flex-row w-full gap-3 mt-2">
                <button id="btn-confirm-delete"
                    class="flex-1 py-2 bg-[#E25C5C] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-white font-bold uppercase active:translate-x-[1px] active:translate-y-[1px] active:shadow-none">Delete</button>
                <button id="btn-cancel-delete"
                    class="flex-1 py-2 bg-white border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase active:translate-x-[1px] active:translate-y-[1px] active:shadow-none">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Avatar Crop Modal -->
    <div id="avatar-modal" class="fixed inset-0 z-[70] flex items-center justify-center hidden p-4">
        <!-- Backdrop with Blur -->
        <div id="avatar-backdrop" class="absolute inset-0 bg-[#1E1E1E]/40 backdrop-blur-md backdrop-fade-in"></div>

        <!-- Modal Content -->
        <div class="relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[6px_6px_0px_#1E1E1E] p-6 flex flex-col gap-5 fade-in">
            
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-black uppercase tracking-tight text-[#1E1E1E]">Change Profile Picture</h2>
            </div>
            
            <!-- Upload Area -->
            <div class="space-y-3">
                <input type="file" id="avatar-input" class="hidden" accept="image/*">
                <button id="btn-select-image" class="w-full py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase text-sm tracking-wider flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
                    </svg>
                    Select Image
                </button>
            </div>

            <!-- Crop Area -->
            <div id="crop-container" class="bg-gray-100 border-2 border-dashed border-[#1E1E1E]/30 min-h-[300px] max-h-[400px] overflow-hidden relative">
                <img id="avatar-crop-image" src="" style="display:block; max-width:100%; opacity:0;">
                <div id="avatar-placeholder" class="absolute inset-0 flex flex-col items-center justify-center gap-2 opacity-40 text-[#1E1E1E]">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p class="text-xs font-bold uppercase tracking-widest">No image selected</p>
                </div>
            </div>

            <!-- Modal Actions -->
            <div class="flex flex-row w-full gap-3 mt-2">
                <button id="btn-save-avatar"
                    class="flex-1 py-3 bg-[#B4F8C8] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all text-sm tracking-wider">
                    ✓ Save
                </button>
                <button id="btn-cancel-avatar"
                    class="flex-1 py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all text-sm tracking-wider">
                    ✕ Cancel
                </button>
            </div>
        </div>
    </div>

    <!-- Save Confirmation Modal -->
    <div id="save-modal" class="fixed inset-0 z-[80] flex items-center justify-center hidden p-4">
        <!-- Backdrop -->
        <div id="save-backdrop" class="absolute inset-0 bg-[#1E1E1E]/40 backdrop-blur-md backdrop-fade-in"></div>

        <!-- Modal Content -->
        <div class="relative w-full max-w-[400px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[6px_6px_0px_#1E1E1E] p-8 flex flex-col items-center text-center gap-5 fade-in">
            <!-- Icon -->
            <div class="bg-[#B4F8C8] border-2 border-[#1E1E1E] p-4 shadow-[3px_3px_0px_#1E1E1E]">
                <svg class="w-10 h-10" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>

            <!-- Text -->
            <div class="space-y-1">
                <h2 class="text-2xl font-black uppercase tracking-tight text-[#1E1E1E]">Save Changes?</h2>
                <p class="text-[#1E1E1E] text-sm font-bold opacity-60">Do you want to update this user's profile picture?</p>
            </div>

            <!-- Buttons -->
            <div class="flex flex-row w-full gap-3">
                <button id="btn-confirm-save"
                    class="flex-1 py-3 bg-[#B4F8C8] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all text-sm tracking-wider">
                    ✓ Confirm
                </button>
                <button id="btn-cancel-save"
                    class="flex-1 py-3 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold uppercase transition-all text-sm tracking-wider">
                    ✕ Cancel
                </button>
            </div>
        </div>
    </div>

</body>
</html>
