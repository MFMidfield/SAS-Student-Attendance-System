<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard - Lunar PJ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <div id="main-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] overflow-hidden">

        <!-- Top Accent Bar -->
        <div class="w-full h-2 bg-gradient-to-r from-[#D96C6C] via-[#E46F20] to-[#FEB729]"></div>

        <!-- Profile Header -->
        <div class="relative px-5 pt-5 pb-4">
            <div class="flex items-center gap-4">
                <!-- Avatar -->
                <div
                    class="h-16 w-16 shrink-0 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] overflow-hidden rounded-sm">
                    <img id="student-image" src="" alt="Teacher Profile" class="w-full h-full object-cover">
                </div>

                <!-- Name + Greeting -->
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-bold text-[#1E1E1E]/60 uppercase tracking-wider">Teacher Portal</p>
                    <h1 id="student-name" class="text-xl font-bold text-[#1E1E1E] tracking-tight truncate"
                        style="-webkit-text-stroke: 0.3px #1E1E1E;">Loading...</h1>
                </div>

                <!-- Role Badge -->
                <div
                    class="shrink-0 bg-[#E46F20] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] px-3 py-1.5 text-center">
                    <p class="text-[10px] font-bold text-white uppercase leading-tight">ROLE</p>
                    <p class="text-xs font-black text-white leading-tight uppercase">TEACHER</p>
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div class="mx-5 border-t-2 border-[#1E1E1E]/15"></div>

        <!-- Stats Overview (Classroom Specific) -->
        <div class="px-5 pt-4 pb-2">
            <div class="flex items-center justify-between mb-3">
                <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Classroom Overview</span>
                <span id="classroom-label" class="text-[10px] font-bold bg-[#F2C00F] px-2 py-0.5 border border-[#1E1E1E] shadow-[1px_1px_0px_#1E1E1E]">ROOM -</span>
            </div>

            <div class="grid grid-cols-3 gap-2">
                <!-- Total Students -->
                <div class="bg-white border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] p-2 text-center">
                    <p id="stat-total-users" class="text-lg font-black text-[#1E1E1E]">-</p>
                    <p class="text-[9px] font-bold text-[#1E1E1E]/40 uppercase">Students</p>
                </div>
                <!-- Pending -->
                <div class="bg-[#F18B74]/20 border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] p-2 text-center">
                    <p id="stat-pending" class="text-lg font-black text-[#1E1E1E]">-</p>
                    <p class="text-[9px] font-bold text-[#1E1E1E]/40 uppercase">Pending</p>
                </div>
                <!-- Verified -->
                <div class="bg-[#73CB8F]/20 border-2 border-[#1E1E1E] shadow-[3px_3px_0px_#1E1E1E] p-2 text-center">
                    <p id="stat-verified" class="text-lg font-black text-[#1E1E1E]">-</p>
                    <p class="text-[9px] font-bold text-[#1E1E1E]/40 uppercase">Verified</p>
                </div>
            </div>
        </div>

        <!-- Divider -->
        <div class="mx-5 mt-2 border-t-2 border-[#1E1E1E]/15"></div>

        <!-- Navigation Grid -->
        <div class="px-5 pt-4 pb-5">
            <div class="flex items-center gap-2 mb-3">
                <span class="text-xs font-bold text-[#1E1E1E]/50 uppercase tracking-widest">Quick Actions</span>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <!-- User Management -->
                <button id="btn-user-edit"
                    class="fade-in flex flex-col items-center gap-2 p-4 bg-[#E46F20] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] cursor-pointer group">
                    <div
                        class="w-12 h-12 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] flex items-center justify-center group-hover:rotate-6 transition-transform duration-200">
                        <svg class="w-6 h-6" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                    </div>
                    <span class="text-sm font-bold text-[#1E1E1E] uppercase tracking-wider">Users</span>
                    <span class="text-[10px] font-bold text-[#1E1E1E]/50">Manage room</span>
                </button>

                <!-- Schedule Management -->
                <button id="btn-schedule"
                    class="fade-in flex flex-col items-center gap-2 p-4 bg-[#FEB729] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] cursor-pointer group">
                    <div
                        class="w-12 h-12 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] flex items-center justify-center group-hover:rotate-6 transition-transform duration-200">
                        <svg class="w-6 h-6" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <span class="text-sm font-bold text-[#1E1E1E] uppercase tracking-wider">Schedule</span>
                    <span class="text-[10px] font-bold text-[#1E1E1E]/50">Class timetable</span>
                </button>

                <!-- Attendance Verify Logs -->
                <button id="btn-verify-logs"
                    class="fade-in flex flex-col items-center gap-2 p-4 bg-[#5B8DEF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] cursor-pointer group">
                    <div
                        class="w-12 h-12 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] flex items-center justify-center group-hover:rotate-6 transition-transform duration-200">
                        <svg class="w-6 h-6" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
                        </svg>
                    </div>
                    <span class="text-sm font-bold text-[#1E1E1E] uppercase tracking-wider">Verified</span>
                    <span class="text-[10px] font-bold text-[#1E1E1E]/50">Check history</span>
                </button>

                <!-- Attendance Approve -->
                <button id="btn-approve"
                    class="fade-in flex flex-col items-center gap-2 p-4 bg-[#73CB8F] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] cursor-pointer group">
                    <div
                        class="w-12 h-12 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] flex items-center justify-center group-hover:rotate-6 transition-transform duration-200">
                        <svg class="w-6 h-6" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                    <span class="text-sm font-bold text-[#1E1E1E] uppercase tracking-wider">Approve</span>
                    <span class="text-[10px] font-bold text-[#1E1E1E]/50">Check presence</span>
                </button>

                <!-- Activity -->
                <button id="btn-activity"
                    class="fade-in flex flex-col items-center gap-2 p-4 bg-[#B29B58] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] cursor-pointer group">
                    <div
                        class="w-12 h-12 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] flex items-center justify-center group-hover:rotate-6 transition-transform duration-200">
                        <svg class="w-6 h-6" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <span class="text-sm font-bold text-[#1E1E1E] uppercase tracking-wider">Activity</span>
                    <span class="text-[10px] font-bold text-[#1E1E1E]/50">School events</span>
                </button>

                <!-- Settings -->
                <button id="btn-setting"
                    class="fade-in flex flex-col items-center gap-2 p-4 bg-[#FFFFFF] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] cursor-pointer group">
                    <div
                        class="w-12 h-12 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[2px_2px_0px_#1E1E1E] flex items-center justify-center group-hover:rotate-6 transition-transform duration-200">
                        <svg class="w-6 h-6" fill="none" stroke="#1E1E1E" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                    </div>
                    <span class="text-sm font-bold text-[#1E1E1E] uppercase tracking-wider">Setting</span>
                    <span class="text-[10px] font-bold text-[#1E1E1E]/50">Account info</span>
                </button>
            </div>
        </div>

        <!-- Bottom Accent -->
        <div class="w-full h-1.5 bg-gradient-to-r from-[#FEB729] via-[#E46F20] to-[#D96C6C]"></div>
    </div>

    <!-- Footer -->
    <div class="fade-in w-full max-w-[450px] mt-4 text-center">
        <p class="text-[#1E1E1E]/40 text-xs font-bold">© 2026 Lunar PJ — Teacher Portal</p>
    </div>

</body>

</html>
