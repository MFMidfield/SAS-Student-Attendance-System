<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Lunar PJ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap');

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
        }

        /* Animation for fade in */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
        }
        .btn-active {
            transform: translate(2px, 2px) !important;
            box-shadow: 2px 2px 0px #1E1E1E !important;
            color: #ffffff !important;
        }

        .btn-active-2 {
            transform: translate(2px, 2px) !important;
            box-shadow: 2px 2px 0px #1E1E1E !important;
            color: #1E1E1E !important;
        }
    </style>
</head>

<body class="bg-[#EEEDDE] flex flex-col justify-center items-center min-h-screen p-4">

    <div id="login-card"
        class="fade-in relative w-full max-w-[450px] bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] p-8 flex flex-col gap-6">
        
        <div class="mt-1">
            <!-- Stylized Stack Icon matching the image -->
            <svg width="60" height="50" viewBox="0 0 60 50" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Top bar -->
                <rect x="2" y="2" width="46" height="8" stroke="#1E1E1E" stroke-width="3"/>
                <circle cx="43" cy="6" r="1.5" fill="#1E1E1E"/>
                
                <!-- Middle bar -->
                <rect x="2" y="18" width="46" height="8" stroke="#1E1E1E" stroke-width="3"/>
                <rect x="15" y="20.5" width="16" height="3" fill="#1E1E1E"/>
                <rect x="5" y="20.5" width="8" height="3" stroke="#1E1E1E" stroke-width="1"/>

                <!-- Bottom bar -->
                <rect x="2" y="34" width="46" height="8" stroke="#1E1E1E" stroke-width="3"/>
                <circle cx="43" cy="38" r="1.5" fill="#1E1E1E"/>
            </svg>
        </div>

        <div class="space-y-1">
            <h1 class="text-4xl font-black text-[#1E1E1E] leading-one tracking-tighter">Welcome</h1>
            <p class="text-[#1E1E1E] text-md font-bold">
                Don't have an account? <a href="#register" class="underline decoration-2 hover:text-[#007BFF] transition-all">Register</a>
            </p>
        </div>

        <form class="flex flex-col gap-5" id="loginForm">
            <div class="relative">
                <input type="email" id="email" placeholder="Email" required
                    onfocus="this.classList.add('btn-active-2')"
                    onblur="this.classList.remove('btn-active-2')"
                    class="w-full p-4 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold placeholder-[#1E1E1E]/50 transition-all focus:outline-none">
            </div>
            <div class="relative">
                <input type="password" id="password" placeholder="password" required
                    onfocus="this.classList.add('btn-active-2')"
                    onblur="this.classList.remove('btn-active-2')"
                    pattern="^[a-zA-Z0-9!@#$%^&*()_+\-=[\]{};':&quot;\\|,.<>/?~` ]*$"
                    title="Password must contain only English characters and special symbols."
                    class="w-full p-4 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] font-bold placeholder-[#1E1E1E]/50 transition-all focus:outline-none">
            </div>
            
            <button type="submit" 
                class="w-full py-4 mt-2 bg-[#F2C00F] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-2xl font-black uppercase transition-all">
                Confirm
            </button>
            <p id="msg" class="text-center font-bold"></p>
        </form>

    </div>
    <div class="fade-in flex flex-row justify-end items-center w-full max-w-[450px] mt-6">
        <div class="w-full">
            <button id="btn-back" class="flex flex-row justify-center items-center w-full p-4 h-15 bg-[#EEEDDE] border-2 border-[#1E1E1E] shadow-[4px_4px_0px_#1E1E1E] text-[#1E1E1E] text-2xl font-black uppercase transition-all">
                <span class="text-[#1E1E1E] text-xl font-black uppercase tracking-wider">Back</span></button>
        </div>
    </div>
</body>

</html>
